<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Test</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
    }

    .box {
      text-align: center;
      padding: 40px;
      border-radius: 16px;
      background: #1e293b;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      max-width: 500px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 2.5rem;
    }

    p {
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .image-container {
      margin-bottom: 20px;
    }

    .image-container img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid #3b82f6;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
    }

    .caption {
      font-size: 1.1rem;
      font-weight: bold;
      color: #60a5fa;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Guess Who Bought Your Domain? 🎉</h1>
    <div class="image-container">
      <img src="image1.jpeg" alt="Surprise!" />
    </div>
    <p class="caption">It's me! can buy it off me for £10000000000 :) </p>
    <p>the best guy, George </p>
  </div>
</body>
</html>
