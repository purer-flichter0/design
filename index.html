<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Test</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
    }

    .box {
      text-align: center;
      padding: 40px;
      border-radius: 16px;
      background: #1e293b;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 3rem;
    }

    p {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>GitHub Pages Works 🎉</h1>
    <p>Repo: purer-flichter0/design</p>
  </div>
</body>
</html>
